---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs-nvme
provisioner: zfs.csi.openebs.io
parameters:
  poolname: nvme-pool
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
  - matchLabelExpressions:
      - key: kubernetes.io/hostname
        values: ["kubeworker01","kubeworker02"]
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs-ssd
provisioner: zfs.csi.openebs.io
parameters:
  poolname: ssd-pool
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
  - matchLabelExpressions:
      - key: kubernetes.io/hostname
        values: ["kubeworker01","kubeworker02","kubeworker03"]
