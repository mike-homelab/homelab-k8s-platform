---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zfs-csi-node
  namespace: zfs-csi
spec:
  selector:
    matchLabels:
      app: zfs-csi-node
  template:
    metadata:
      labels:
        app: zfs-csi-node
    spec:
      serviceAccountName: zfs-csi-sa
      containers:
        - name: zfs-plugin
          image: openebs/zfs-driver:2.6.0
          securityContext:
            privileged: true
          args:
            - "--endpoint=unix:///csi/csi.sock"
            - "--nodename=$(KUBE_NODE_NAME)"
            - "--plugin=node"
            - "--name=zfs.csi.openebs.io"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - mountPath: /var/lib/kubelet
              name: kubelet-dir
              mountPropagation: Bidirectional
            - mountPath: /dev
              name: device-dir
            - mountPath: /run
              name: run-dir
            - mountPath: /etc/udev
              name: udev-dir
            - mountPath: /csi
              name: socket-dir
        - name: csi-node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.9.0
          args:
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /registration
              name: registration-dir
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: run-dir
          hostPath:
            path: /run
        - name: udev-dir
          hostPath:
            path: /etc/udev
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/zfs.csi.openebs.io
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory

