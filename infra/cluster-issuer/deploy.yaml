---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-cluster-issuer
spec:
  vault:
    server: "http://vault.michaelhomelab.work:8200"
    path: pki_int/issue/michaelhomelab-cluster
    auth:
      kubernetes:
        mountclusterePath: /v1/auth/kubernetes
        role: cert-manager
        serviceAccountRef:
          name: cert-manager

