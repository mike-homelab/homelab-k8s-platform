apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Core platform and infrastructure components

  sourceRepos:
  - git@github.com:mike-homelab/homelab-k8s-platform.git

  destinations:
  - server: https://kubernetes.default.svc
    namespace: argocd
  - server: https://kubernetes.default.svc
    namespace: metallb-system
  - server: https://kubernetes.default.svc
    namespace: cert-manager

  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
