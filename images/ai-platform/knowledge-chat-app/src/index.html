<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Knowledge Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #030712;
      --panel-bg: rgba(17, 24, 39, 0.65);
      --panel-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --brand-primary: #8b5cf6;
      --brand-secondary: #3b82f6;
      --accent: #2dd4bf;
      --success: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --input-bg: rgba(31, 41, 55, 0.6);
      --btn-bg: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .bg-blobs {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1; overflow: hidden; pointer-events: none;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4;
      animation: float 20s infinite alternate ease-in-out;
    }
    .blob1 { width: 500px; height: 500px; background: #4c1d95; top: -10%; left: -10%; }
    .blob2 { width: 600px; height: 600px; background: #1e3a8a; bottom: -20%; right: -10%; animation-delay: -5s; }
    .blob3 { width: 400px; height: 400px; background: #115e59; top: 40%; left: 40%; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .container {
      width: 100%; max-width: 1400px; margin: 0 auto; padding: 30px 20px;
      display: flex; flex-direction: column; height: 100vh;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-size: 2.2rem; font-weight: 700;
      background: linear-gradient(to right, #a78bfa, #60a5fa);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: var(--text-muted); font-size: 1rem; }

    .panel {
      background: var(--panel-bg); backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border); border-radius: 20px;
      padding: 25px; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    .chat-layout { display: flex; flex-direction: column; height: 100%; gap: 15px; min-height: 0; }
    .chat-main { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; min-height: 0; }

    .telemetry-pane {
      background: rgba(0, 0, 0, 0.2); border: 1px solid var(--brand-primary);
      border-radius: 12px; padding: 12px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      gap: 15px; flex-shrink: 0;
    }
    .telemetry-left { display: flex; flex-direction: column; }
    .telemetry-header { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    .telemetry-stats-area { display: flex; gap: 10px; }
    .telemetry-stat { display: flex; flex-direction: column; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 8px; min-width: 80px; }
    .telemetry-stat .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
    .telemetry-stat .value { font-size: 1rem; font-weight: 600; color: #fff; }
    
    .telemetry-charts { display: flex; gap: 15px; }
    .chart-box { display: flex; flex-direction: column; align-items: center; }
    .chart-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .chart-container-small { position: relative; width: 150px; height: 60px; }

    .chat-window {
      flex-grow: 1; background: rgba(0, 0, 0, 0.15); border: 1px solid var(--panel-border);
      border-radius: 12px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    
    .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; animation: slideIn 0.3s ease-out; }
    .message.user { align-self: flex-end; background: var(--btn-bg); color: #fff; border-bottom-right-radius: 4px; }
    .message.bot { align-self: flex-start; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--panel-border); border-bottom-left-radius: 4px; }
    
    .message .sources-block { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: var(--text-muted); }
    .message .sources-block a { color: var(--brand-secondary); text-decoration: none; }

    .message-kb-badges { display: flex; gap: 6px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .kb-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: rgba(45, 212, 191, 0.1); color: var(--accent); border: 1px solid rgba(45, 212, 191, 0.3); }

    .chat-input-area { display: flex; gap: 12px; align-items: flex-end; }
    .chat-input-wrapper { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
    .chat-settings-ribbon { display: flex; gap: 12px; font-size: 0.8rem; color: var(--text-muted); }
    .chat-settings-ribbon select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; border-radius: 6px; padding: 3px 6px; }

    .chat-input-wrapper textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--panel-border);
      border-radius: 16px; padding: 12px 16px; color: var(--text-main); font-family: inherit;
      resize: none; min-height: 50px; max-height: 120px; outline: none;
    }
    
    .send-btn { width: 50px; height: 50px; border-radius: 16px; border: none; background: var(--btn-bg); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .send-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }

    .typing-indicator { display: none; align-self: flex-start; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 18px; gap: 4px; align-items: center; }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: blink 1.4s infinite both; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 20% { opacity: 1; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>

  <div class="container">
    <div class="header">
      <h1>AI Knowledge Chat</h1>
      <p>Consult Cloud institutional endpoints</p>
    </div>

    <div class="panel">
      <div class="chat-layout">
        <div class="telemetry-pane">
          <div class="telemetry-left">
            <div class="telemetry-header">Live Query Telemetry</div>
            <div id="telemetryStatus" style="font-size:0.75rem; color:var(--text-muted); margin-bottom:8px;">Waiting for query...</div>
            <div class="telemetry-stats-area">
              <div class="telemetry-stat"><span class="label">Tokens</span><span class="value" id="tTokens">-</span></div>
              <div class="telemetry-stat"><span class="label">VRAM %</span><span class="value" id="tVram">-</span></div>
              <div class="telemetry-stat"><span class="label">Latency</span><span class="value" id="tLatency">-</span></div>
            </div>
          </div>
          <div class="telemetry-charts">
            <div class="chart-box"><div class="chart-title">CPU</div><div class="chart-container-small"><canvas id="cpuChart"></canvas></div></div>
            <div class="chart-box"><div class="chart-title">RAM (MB)</div><div class="chart-container-small"><canvas id="ramChart"></canvas></div></div>
          </div>
        </div>

        <div class="chat-main">
          <div class="chat-window" id="chatWindow">
            <div class="message bot"><p>Hello! I am your AI assistant. Ask me anything about your configured knowledge bases.</p></div>
            <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
          </div>
  
          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <div class="chat-settings-ribbon">
                <label>Tokens: <select id="optTokens"><option value="1024">1024</option><option value="2048" selected>2048</option><option value="4096">4096</option></select></label>
                <label>Chunks: <select id="optChunks"><option value="4">4</option><option value="10" selected>10</option><option value="16">16</option></select></label>
                <label>Temp: <select id="optTemp"><option value="0.1">0.1</option><option value="0.4" selected>0.4</option><option value="0.7">0.7</option></select></label>
              </div>
              <textarea id="questionInput" placeholder="Ask a question..." rows="1" onInput="this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'"></textarea>
            </div>
            <button id="sendBtn" class="send-btn"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://agent-api.michaelhomelab.work";
    const sessionId = 'web-sess-' + Math.random().toString(36).substring(2, 15);

    const chatWindow = document.getElementById('chatWindow');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    function appendMessage(text, isUser, sources = []) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      if (isUser) { div.textContent = text; } 
      else {
        let htmlContent = marked.parse(text);
        if (sources && sources.length > 0) {
          const collections = [...new Set(sources.map(s => s.collection).filter(Boolean))];
          const badgesHtml = collections.map(c => `<span class="kb-badge">${c}</span>`).join('');
          htmlContent = `<div class="message-kb-badges">${badgesHtml}</div>` + htmlContent;
          const srcDiv = document.createElement('div'); srcDiv.className = 'sources-block';
          srcDiv.innerHTML = '<strong>Sources:</strong><br>' + sources.map((s,i) => `${i+1}. score: ${s.score.toFixed(3)} <a href="${s.url||'#'}" target="_blank">[link]</a>`).join('<br>');
          div.innerHTML = htmlContent; div.appendChild(srcDiv);
        } else { div.innerHTML = htmlContent; }
      }
      chatWindow.insertBefore(div, typingIndicator); scrollToBottom();
    }

    function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    let cpuChartInstance = null; let ramChartInstance = null;
    function initCharts() {
      const cpuCtx = document.getElementById('cpuChart').getContext('2d');
      const ramCtx = document.getElementById('ramChart').getContext('2d');
      cpuChartInstance = new Chart(cpuCtx, { type: 'doughnut', data: { labels: ['vLLM', 'API'], datasets: [{ data: [0, 0], backgroundColor: ['#8b5cf6', '#3b82f6'], borderColor: 'rgba(0,0,0,0)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
      ramChartInstance = new Chart(ramCtx, { type: 'bar', data: { labels: ['vLLM', 'API'], datasets: [{ label: 'MB', data: [0, 0], backgroundColor: ['#2dd4bf', '#fbbf24'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
    }
    window.addEventListener('load', initCharts);

    async function fetchTelemetry(endTimeStr, latencySecs) {
      try {
        const res = await fetch(`${API}/ops/query-telemetry`, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ timestamp: endTimeStr }) });
        const data = await res.json();
        document.getElementById('tVram').textContent = (data.gpu_cache || 0).toFixed(2) + "%";
        document.getElementById('tLatency').textContent = latencySecs.toFixed(2) + "s";
        cpuChartInstance.data.datasets[0].data = [(data.cpu_vllm || 0), (data.cpu_api || 0)]; cpuChartInstance.update();
        ramChartInstance.data.datasets[0].data = [(data.ram_vllm || 0), (data.ram_api || 0)]; ramChartInstance.update();
      } catch (e) { console.error(e); }
    }

    async function submitQuestion() {
      const q = questionInput.value.trim(); if (!q) return;
      appendMessage(q, true); questionInput.value = ''; sendBtn.disabled = true; typingIndicator.style.display = 'flex'; scrollToBottom();

      const startTime = Date.now(); let ok = false;
      try {
        const res = await fetch(`${API}/rag/ask`, {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            question: q, session_id: sessionId, collection: "auto", model: "general",
            top_k: parseInt(document.getElementById('optChunks').value),
            max_tokens: parseInt(document.getElementById('optTokens').value),
            temperature: parseFloat(document.getElementById('optTemp').value)
          })
        });
        const data = await res.json();
        appendMessage(data.answer || "No response.", false, data.sources);
        if (data.tokens) document.getElementById('tTokens').textContent = data.tokens;
        ok = true;
      } catch (err) { appendMessage(`⚠️ Error: ${err.message}`, false); } finally {
        typingIndicator.style.display = 'none'; sendBtn.disabled = false;
        if (ok) fetchTelemetry(new Date().toISOString(), (Date.now() - startTime) / 1000.0);
      }
    }

    sendBtn.addEventListener('click', submitQuestion);
    questionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuestion(); } });
  </script>
</body>
</html>
