name: Build vLLM Gemma Image
# trigger rebuild marker: 2026-04-10

on:
  push:
    branches:
      - main
    paths:
      - images/ai-platform/vllm/reasoning/**
      - .github/workflows/build-vllm-reasoning.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push vLLM Reasoning
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-reasoning:v0.7.3 \
            images/ai-platform/vllm/reasoning

      - name: Push Docker image
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Pushing docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-reasoning:v0.7.3...";
            docker push docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-reasoning:v0.7.3 && break || sleep 15;
          done
      - name: Clean up Docker image
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-reasoning:v0.7.3 || true
