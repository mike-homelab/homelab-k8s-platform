name: Build Knowledge Chat Image

on:
  push:
    branches:
      - main
    paths:
      - images/ai-application/savant/**
      - .github/workflows/build-savant.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Savant
    runs-on: [self-hosted]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-application/savant:latest \
            images/ai-application/savant

      - name: Push Docker image
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Pushing savant:latest...";
            docker push docker.michaelhomelab.work/homelab-docker-repo/ai-application/savant:latest && break || sleep 15;
          done

      - name: Clean up Docker image
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-application/savant:latest || true
