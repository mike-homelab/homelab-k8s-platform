name: Build Knowledge Chat App Image

on:
  push:
    branches: [main]
    paths:
      - images/ai-platform/knowledge-chat-app/**
      - .github/workflows/build-knowledge-chat-app.yaml
  pull_request:
    branches: [main]
    paths:
      - images/ai-platform/knowledge-chat-app/**
      - .github/workflows/build-knowledge-chat-app.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Knowledge Chat App
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat images/ai-platform/knowledge-chat-app/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-platform/knowledge-chat-app:${{ steps.version.outputs.version }} \
            images/ai-platform/knowledge-chat-app

      - name: Push Docker image
        run: |
          docker push docker.michaelhomelab.work/homelab-docker-repo/ai-platform/knowledge-chat-app:${{ steps.version.outputs.version }}
      - name: Clean up
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-platform/knowledge-chat-app:${{ steps.version.outputs.version }} || true
