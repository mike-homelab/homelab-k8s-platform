name: Build Observability Agent Image
# trigger rebuild marker: 2026-03-08

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - images/ai-platform/agents/observability-agent/**
      - .github/workflows/build-observability-agent.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Observability Agent
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat images/ai-platform/agents/observability-agent/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-platform/observability-agent:${{ steps.version.outputs.version }} \
            images/ai-platform/agents/observability-agent

      - name: Push Docker image
        run: |
          docker push docker.michaelhomelab.work/homelab-docker-repo/ai-platform/observability-agent:${{ steps.version.outputs.version }}
      - name: Clean up Docker image
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-platform/observability-agent:${{ steps.version.outputs.version }} || true
