name: Build Platform Dashboard Image

on:
  push:
    branches: [main]
    paths:
      - images/ai-platform/platform-dashboard/**
      - .github/workflows/build-platform-dashboard.yaml
  pull_request:
    branches: [main]
    paths:
      - images/ai-platform/platform-dashboard/**
      - .github/workflows/build-platform-dashboard.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Platform Dashboard
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat images/ai-platform/platform-dashboard/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:${{ steps.version.outputs.version }} \
            images/ai-platform/platform-dashboard

      - name: Push Docker image
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: Pushing docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:${{ steps.version.outputs.version }}...";
            docker push docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:${{ steps.version.outputs.version }} && break || sleep 15;
          done
      - name: Clean up
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:${{ steps.version.outputs.version }} || true
