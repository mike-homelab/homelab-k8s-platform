name: Build vLLM Router Image
# trigger rebuild marker: 2026-03-08

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - images/ai-platform/vllm/router/**
      - .github/workflows/build-vllm-router.yaml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push vLLM Router
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat images/ai-platform/vllm/router/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-router:${{ steps.version.outputs.version }} \
            images/ai-platform/vllm/router

      - name: Push Docker image
        run: |
          docker push docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-router:${{ steps.version.outputs.version }}
