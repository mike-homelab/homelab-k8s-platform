name: Build Raphael Image

on:
  push:
    branches:
      - main
    paths:
      - images/ai-agent/raphael/**
      - .github/workflows/raphael-ci.yml
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Raphael
    runs-on: [self-hosted]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Version
        id: prep
        run: |
          VERSION=$(cat images/ai-agent/raphael/VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to Nexus Docker registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login docker.michaelhomelab.work \
              --username "${{ secrets.NEXUS_USERNAME }}" \
              --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-agent/raphael:${{ env.VERSION }} \
            -t docker.michaelhomelab.work/homelab-docker-repo/ai-agent/raphael:latest \
            images/ai-agent/raphael

      - name: Push Docker image
        run: |
          for tag in ${{ env.VERSION }} latest; do
            for i in 1 2 3 4 5; do
              echo "Attempt $i: Pushing raphael:${tag}...";
              docker push docker.michaelhomelab.work/homelab-docker-repo/ai-agent/raphael:${tag} && break || sleep 15;
            done
          done

      - name: Clean up Docker image
        if: always()
        run: |
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-agent/raphael:${{ env.VERSION }} || true
          docker rmi docker.michaelhomelab.work/homelab-docker-repo/ai-agent/raphael:latest || true
