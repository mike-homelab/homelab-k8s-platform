apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.2
          args: ["start-dev", "--db=postgres", "--import-realm"]
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: "jdbc:postgresql://keycloak-db:5432/keycloak"
            - name: KC_DB_USERNAME
              valueFrom: { secretKeyRef: { name: keycloak-db-secret, key: POSTGRES_USER } }
            - name: KC_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: keycloak-db-secret, key: POSTGRES_PASSWORD } }
            - name: KEYCLOAK_ADMIN
              valueFrom: { secretKeyRef: { name: keycloak-admin-secret, key: KEYCLOAK_ADMIN } }
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: keycloak-admin-secret, key: KEYCLOAK_ADMIN_PASSWORD } }
            - name: KC_HOSTNAME
              value: "sso.michaelhomelab.work"
            - name: KC_HOSTNAME_ADMIN
              value: "keycloak.michaelhomelab.work"
            - name: KC_PROXY
              value: "edge"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
