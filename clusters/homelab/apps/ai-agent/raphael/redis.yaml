apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: raphael-redis
  namespace: ai-agent
spec:
  serviceName: raphael-redis
  replicas: 1
  selector:
    matchLabels:
      app: raphael-redis
  template:
    metadata:
      labels:
        app: raphael-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.65.0-alpine
          args:
            - "-redis.addr=redis://localhost:6379"
          ports:
            - containerPort: 9121
              name: metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: raphael-redis
  namespace: ai-agent
  labels:
    app: raphael-redis
spec:
  type: ClusterIP
  selector:
    app: raphael-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
    - name: metrics
      port: 9121
      targetPort: metrics
