apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: raphael-qdrant
  namespace: ai-agent
spec:
  serviceName: raphael-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: raphael-qdrant
  template:
    metadata:
      labels:
        app: raphael-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: raphael-qdrant
  namespace: ai-agent
  labels:
    app: raphael-qdrant
spec:
  type: ClusterIP
  selector:
    app: raphael-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
