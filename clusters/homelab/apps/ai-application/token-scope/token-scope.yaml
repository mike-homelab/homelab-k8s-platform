apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-scope
  namespace: ai-platform
  labels:
    app: token-scope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-scope
  template:
    metadata:
      labels:
        app: token-scope
    spec:
      containers:
        - name: web
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/token-scope:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: TEMPO_URL
              value: "http://tempo-query.monitoring.svc.cluster.local:3100/api/search"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: token-scope
  namespace: ai-platform
  labels:
    app: token-scope
spec:
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP
  selector:
    app: token-scope
  type: ClusterIP
