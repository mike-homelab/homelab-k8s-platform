apiVersion: apps/v1
kind: Deployment
metadata:
  name: savant
  namespace: ai-platform
  labels:
    app: savant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: savant
  template:
    metadata:
      labels:
        app: savant
    spec:
      containers:
        - name: savant
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-application/savant:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: OLLAMA_URL
              value: "http://vllm-reasoning.ai-platform.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "phi3.5"
            - name: QDRANT_URL
              value: "http://qdrant.ai-platform.svc.cluster.local:6333"
            - name: QDRANT_COLLECTION
              value: "knowledge"
            - name: EMBED_URL
              value: "http://infinity-embedding.ai-platform.svc.cluster.local:8000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: savant
  namespace: ai-platform
  labels:
    app: savant
spec:
  type: ClusterIP
  selector:
    app: savant
  ports:
    - name: http
      port: 80
      targetPort: 80
