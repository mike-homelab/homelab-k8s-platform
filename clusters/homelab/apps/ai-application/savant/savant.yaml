apiVersion: apps/v1
kind: Deployment
metadata:
  name: savant
  namespace: ai-platform
  labels:
    app: savant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: savant
  template:
    metadata:
      labels:
        app: savant
    spec:
      containers:
        - name: savant
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-application/savant:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: LITELLM_URL
              value: "http://litellm.ai-platform.svc.cluster.local:4000/v1"
            - name: LITELLM_MODEL
              value: "reasoning"
            - name: LITELLM_API_KEY
              value: "sk-michael-homelab-llm-proxy"
            - name: QDRANT_URL
              value: "http://qdrant.ai-platform.svc.cluster.local:6333"
            - name: QDRANT_COLLECTION
              value: "knowledge"
            - name: EMBED_URL
              value: "http://infinity-embedding.ai-platform.svc.cluster.local:8000"
            - name: SEARXNG_URL
              value: "http://searxng.ai-platform.svc.cluster.local:8080"
            - name: RERANK_URL
              value: "http://infinity-embedding.ai-platform.svc.cluster.local:8001"
            - name: WATCHTOWER_URL
              value: "http://watchtower.ai-platform.svc.cluster.local"
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: savant
  namespace: ai-platform
  labels:
    app: savant
spec:
  type: ClusterIP
  selector:
    app: savant
  ports:
    - name: http
      port: 80
      targetPort: 80
