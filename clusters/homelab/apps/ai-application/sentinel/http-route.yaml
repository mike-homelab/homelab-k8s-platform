---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: watchtower-route
  namespace: ai-platform
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
  hostnames:
    - watchtower.michaelhomelab.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sentinel
          port: 80
