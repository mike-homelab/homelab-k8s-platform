apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchtower
  namespace: ai-platform
  labels:
    app: watchtower
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchtower
  template:
    metadata:
      labels:
        app: watchtower
    spec:
      containers:
        - name: watchtower
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-application/watchtower:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: LOKI_URL
              value: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1"
            - name: TEMPO_URL
              value: "http://tempo-query-frontend.monitoring.svc.cluster.local:3100"
            - name: POSTGRES_DSN
              value: "postgresql://watchtower:watchtower@postgres.ai-platform.svc.cluster.local:5432/watchtower"
            - name: REDIS_URL
              value: "redis://redis.ai-platform.svc.cluster.local:6379/0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: watchtower
  namespace: ai-platform
  labels:
    app: watchtower
spec:
  type: ClusterIP
  selector:
    app: watchtower
  ports:
    - name: http
      port: 80
      targetPort: 80
