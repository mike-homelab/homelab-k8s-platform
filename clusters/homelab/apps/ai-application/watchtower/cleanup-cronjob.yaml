apiVersion: batch/v1
kind: CronJob
metadata:
  name: watchtower-cleanup
  namespace: ai-platform
spec:
  schedule: "0 * * * *"  # Every hour
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleanup
            image: postgres:16-alpine
            env:
            - name: PG_DSN
              value: "postgresql://watchtower:watchtower@postgres.ai-platform.svc.cluster.local:5432/watchtower"
            command:
            - /bin/sh
            - -c
            - |
              echo "[$(date)] Starting cleanup of savant_inference data..."
              psql $PG_DSN -c "DELETE FROM savant_inference WHERE created_at < NOW() - INTERVAL '24 hours';"
              echo "[$(date)] Cleanup complete."
          restartPolicy: OnFailure
