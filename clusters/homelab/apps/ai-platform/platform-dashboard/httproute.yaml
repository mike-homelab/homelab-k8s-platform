apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-dashboard
  namespace: ai-platform
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
  hostnames:
    - platform-dashboard.michaelhomelab.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: platform-dashboard
          port: 80
