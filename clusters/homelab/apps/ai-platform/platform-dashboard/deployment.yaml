apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-dashboard
  template:
    metadata:
      labels:
        app: platform-dashboard
    spec:
      containers:
        - name: web
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: LOKI_URL
              value: "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/query_range"
            - name: PROMETHEUS_URL
              value: "http://mimir.monitoring.svc.cluster.local:8080/api/v1/query"
            - name: REDIS_URL
              value: "redis://redis.ai-platform.svc.cluster.local:6379/0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
