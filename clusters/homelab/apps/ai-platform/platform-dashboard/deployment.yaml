apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-dashboard
  template:
    metadata:
      labels:
        app: platform-dashboard
    spec:
      containers:
        - name: web
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/platform-dashboard:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VLLM_API_URL
              value: "http://vllm-coder:8000"
            - name: QDRANT_API_URL
              value: "http://qdrant:6333"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
