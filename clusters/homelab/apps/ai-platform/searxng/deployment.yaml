apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai-platform
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
      - name: searxng
        image: searxng/searxng:latest
        ports:
        - containerPort: 8080
        env:
        - name: SEARXNG_PORT
          value: "8080"
        - name: SEARXNG_SETTINGS_PATH
          value: "/etc/searxng/settings.yml"
        volumeMounts:
        - name: searxng-settings
          mountPath: /etc/searxng
      volumes:
      - name: searxng-settings
        configMap:
          name: searxng-settings
          items:
            - key: settings.yml
              path: settings.yml
