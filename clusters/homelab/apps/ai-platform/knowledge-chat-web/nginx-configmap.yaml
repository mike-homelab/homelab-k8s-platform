apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-chat-web-nginx
  namespace: ai-platform
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
      }
    }
