apiVersion: v1
kind: Service
metadata:
  name: knowledge-chat-web
  namespace: ai-platform
  labels:
    app: knowledge-chat-web
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9113"
spec:
  type: ClusterIP
  selector:
    app: knowledge-chat-web
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9113
      targetPort: metrics
