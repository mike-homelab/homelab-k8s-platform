apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-chat-web
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-chat-web
  template:
    metadata:
      labels:
        app: knowledge-chat-web
    spec:
      containers:
        - name: web
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/knowledge-chat-web:0.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - -nginx.scrape-uri=http://127.0.0.1/stub_status
            - -web.listen-address=:9113
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: knowledge-chat-web-nginx
