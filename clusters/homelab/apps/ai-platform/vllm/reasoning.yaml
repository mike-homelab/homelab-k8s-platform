apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-reasoning
  namespace: ai-platform
spec:
  serviceName: vllm-reasoning
  replicas: 1
  selector:
    matchLabels:
      app: vllm-reasoning
  template:
    metadata:
      labels:
        app: vllm-reasoning
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti
      containers:
        - name: vllm
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-reasoning:v0.7.3
          imagePullPolicy: Always
          args:
            - --model
            - microsoft/Phi-3.5-mini-instruct
            - --gpu-memory-utilization
            - "0.95"
            - --cpu-offload-gb
            - "8"
            - --max-model-len
            - "128000"
            - --enable-prefix-caching
            - --disable-sliding-window
            - --kv-cache-dtype
            - fp8
            - --otlp-traces-endpoint
            - $(OTEL_EXPORTER_OTLP_ENDPOINT)
          env:
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASHINFER"
            - name: VLLM_USE_V1
              value: "0"
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: mayastor-single-replica
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-reasoning
  namespace: ai-platform
  labels:
    app: vllm-reasoning
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: vllm-reasoning
  ports:
    - name: http
      port: 8000
      targetPort: http
