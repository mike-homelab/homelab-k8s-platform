apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-reasoning
  namespace: ai-platform
spec:
  serviceName: vllm-reasoning
  replicas: 1
  selector:
    matchLabels:
      app: vllm-reasoning
  template:
    metadata:
      labels:
        app: vllm-reasoning
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5070-Ti
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull deepseek-r1:7b
              pkill ollama
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: hf-cache
              mountPath: /models
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          args: ["serve"]
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_NUM_CTX
              value: "128000"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_LOG_FORMAT
              value: "json"
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /models
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-reasoning
  namespace: ai-platform
  labels:
    app: vllm-reasoning
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /api/metrics
    prometheus.io/port: "11434"
spec:
  type: ClusterIP
  selector:
    app: vllm-reasoning
  ports:
    - name: http
      port: 11434
      targetPort: http
