apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infinity-embedding
  namespace: ai-platform
spec:
  serviceName: infinity-embedding
  replicas: 1
  selector:
    matchLabels:
      app: infinity-embedding
  template:
    metadata:
      labels:
        app: infinity-embedding
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-3060
      containers:
        - name: vllm-embed-rerank
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-embedding:latest
          imagePullPolicy: Always
          command: ["/bin/bash"]
          args: 
            - "-c"
            - |
              python3 -m vllm.entrypoints.openai.api_server \
                --model BAAI/bge-large-en-v1.5 \
                --port 8000 \
                --gpu-memory-utilization 0.45 \
                --max-model-len 512 \
                --otlp-traces-endpoint $(OTEL_EXPORTER_OTLP_ENDPOINT) &
              
              python3 -m vllm.entrypoints.openai.api_server \
                --model BAAI/bge-reranker-large \
                --port 8001 \
                --gpu-memory-utilization 0.45 \
                --max-model-len 512 \
                --otlp-traces-endpoint $(OTEL_EXPORTER_OTLP_ENDPOINT) &
              
              wait
          env:
            - name: VLLM_OTEL_TRACING
              value: "1"
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          ports:
            - name: embed
              containerPort: 8000
            - name: rerank
              containerPort: 8001
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "10Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: mayastor-single-replica
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: infinity-embedding
  namespace: ai-platform
  labels:
    app: infinity-embedding
spec:
  type: ClusterIP
  selector:
    app: infinity-embedding
  ports:
    - name: embed
      port: 8000
      targetPort: 8000
    - name: rerank
      port: 8001
      targetPort: 8001
