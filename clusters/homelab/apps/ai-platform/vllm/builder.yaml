apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: builder
  namespace: ai-platform
spec:
  serviceName: builder
  replicas: 1
  selector:
    matchLabels:
      app: builder
  template:
    metadata:
      labels:
        app: builder
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/"
        prometheus.io/port: "11434"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5070-Ti

      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              # Pull the Qwen2.5-Coder 14B model
              ollama pull qwen2.5-coder:14b
              pkill ollama
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: hf-cache
              mountPath: /models
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"

      containers:
        - name: ollama
          image: ollama/ollama:latest
          args: ["serve"]
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_NUM_CTX
              value: "81920"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            - name: OLLAMA_KV_CACHE_TYPE
              value: "q4_0"
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_LOG_FORMAT
              value: "json"
          ports:
            - name: http
              containerPort: 11434

          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: hf-cache
              mountPath: /models

  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 120Gi
---
apiVersion: v1
kind: Service
metadata:
  name: builder
  namespace: ai-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics/"
    prometheus.io/port: "11434"
spec:
  type: ClusterIP
  selector:
    app: builder
  ports:
    - name: http
      port: 11434
      targetPort: http