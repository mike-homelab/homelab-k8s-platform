apiVersion: apps/v1
kind: Deployment
metadata:
  name: reranker
  namespace: ai-platform
  labels:
    app: reranker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reranker
  template:
    metadata:
      labels:
        app: reranker
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti
      containers:
        - name: reranker
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/reranker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-reranker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-reranker
  namespace: ai-platform
spec:
  storageClassName: mayastor-single-replica
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 40Gi
---
apiVersion: v1
kind: Service
metadata:
  name: reranker
  namespace: ai-platform
  labels:
    app: reranker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /health
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: reranker
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
