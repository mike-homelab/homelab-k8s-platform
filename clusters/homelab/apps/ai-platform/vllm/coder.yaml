apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-coder
  namespace: ai-platform
spec:
  serviceName: vllm-coder
  replicas: 1
  selector:
    matchLabels:
      app: vllm-coder
  template:
    metadata:
      labels:
        app: vllm-coder
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti

      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull mistral-small:24b
              pkill ollama
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: hf-cache
              mountPath: /models
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"

      containers:
        - name: ollama
          image: ollama/ollama:latest
          args: ["serve"]
          env:
            - name: OLLAMA_MODELS
              value: /models

            # ⚡ Optimized for tool-calling agents
            - name: OLLAMA_NUM_CTX
              value: "16384"

            # Single user → stability > throughput
            - name: OLLAMA_NUM_PARALLEL
              value: "1"

            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_LOG_FORMAT
              value: "json"
            - name: OLLAMA_KV_CACHE_TYPE
              value: "q4_0"

          ports:
            - name: http
              containerPort: 11434

          resources:
            requests:
              cpu: "8"
              memory: "10Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "16Gi"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: hf-cache
              mountPath: /models

  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-coder
  namespace: ai-platform
spec:
  type: ClusterIP
  selector:
    app: vllm-coder
  ports:
    - name: http
      port: 11434
      targetPort: http