apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-coder
  namespace: ai-platform
spec:
  serviceName: vllm-coder
  replicas: 1
  selector:
    matchLabels:
      app: vllm-coder
  template:
    metadata:
      labels:
        app: vllm-coder
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5060-Ti
      containers:
        - name: vllm
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/vllm-coder:latest
          imagePullPolicy: Always
          args:
            - --model
            - Qwen/Qwen2.5-Coder-3B-Instruct-AWQ
            - --gpu-memory-utilization
            - "0.90"
            - --max-model-len
            - "65536"
            - --enable-prefix-caching
            - --swap-space
            - "4"
            - --quantization
            - awq
            - --kv-cache-dtype
            - fp8
            - --otlp-traces-endpoint
            - $(OTEL_EXPORTER_OTLP_ENDPOINT)
          env:
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASHINFER"
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
               cpu: "2"
               memory: "16Gi"
               nvidia.com/gpu: "1"
            limits:
               cpu: "4"
               memory: "16Gi"
               nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: mayastor-single-replica
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-coder
  namespace: ai-platform
  labels:
    app: vllm-coder
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: vllm-coder
  ports:
    - name: http
      port: 8000
      targetPort: http
