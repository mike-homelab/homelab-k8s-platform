apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-gemma
  namespace: ai-platform
spec:
  serviceName: vllm-gemma
  replicas: 1
  selector:
    matchLabels:
      app: vllm-gemma
  template:
    metadata:
      labels:
        app: vllm-gemma
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5070-Ti
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.9.2
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - google/gemma-4-e4b-it
            - --gpu-memory-utilization
            - "0.90"
            - --max-model-len
            - "131072"
            - --enable-prefix-caching
            - --swap-space
            - "4"
            - --quantization
            - fp8
            - --kv-cache-dtype
            - fp8
            - --otlp-traces-endpoint
            - $(OTEL_EXPORTER_OTLP_ENDPOINT)
          env:
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: mayastor-single-replica
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma
  namespace: ai-platform
  labels:
    app: vllm-gemma
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: vllm-gemma
  ports:
    - name: http
      port: 8000
      targetPort: http
