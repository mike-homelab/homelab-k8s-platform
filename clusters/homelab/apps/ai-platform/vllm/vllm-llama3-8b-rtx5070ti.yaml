apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-llm
  namespace: ai-platform
spec:
  serviceName: vllm-llm
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llm
  template:
    metadata:
      labels:
        app: vllm-llm
    spec:
      nodeSelector:
        kubernetes.io/hostname: kubeworker01
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-5070-Ti
        openebs.io/nodeid: kubeworker01
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.9.2
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - Qwen/Qwen2.5-3B-Instruct
            - --gpu-memory-utilization
            - "0.90"
            - --max-model-len
            - "8192"
            - --enable-prefix-caching
          envFrom:
            - configMapRef:
                name: vllm-otel-env
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "12Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
  volumeClaimTemplates:
    - metadata:
        name: hf-cache
      spec:
        storageClassName: zfs-nvme
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llm
  namespace: ai-platform
  labels:
    app: vllm-llm
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: vllm-llm
  ports:
    - name: http
      port: 8000
      targetPort: http
