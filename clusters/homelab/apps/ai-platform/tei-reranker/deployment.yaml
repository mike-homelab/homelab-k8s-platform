apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-reranker
  namespace: ai-platform
  labels:
    app: tei-reranker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tei-reranker
  template:
    metadata:
      labels:
        app: tei-reranker
    spec:
      nodeSelector:
        kubernetes.io/hostname: kubeworker03
        kubernetes.io/os: linux
        nvidia.com/gpu.product: NVIDIA-GeForce-RTX-3060
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:1.5
          imagePullPolicy: IfNotPresent
          args:
            - "--model-id"
            - "BAAI/bge-reranker-v2-m3"
            - "--port"
            - "80"
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PORT
              value: "80"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tei-reranker
  namespace: ai-platform
  labels:
    app: tei-reranker
spec:
  type: ClusterIP
  selector:
    app: tei-reranker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
