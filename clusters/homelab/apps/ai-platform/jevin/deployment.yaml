apiVersion: apps/v1
kind: Deployment
metadata:
  name: jevin
  namespace: ai-platform
  labels:
    app: jevin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jevin
  template:
    metadata:
      labels:
        app: jevin
    spec:
      serviceAccountName: default
      containers:
        - name: jevin
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/jevin:1.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: VLLM_CODER_BASE_URL
              value: "http://vllm-coder.ai-platform.svc.cluster.local:8000/v1"
            - name: VLLM_CODER_MODEL_ID
              value: "Qwen/Qwen2.5-Coder-3B-Instruct"
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # External fall back logic
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: external-ai-secrets
                  key: gemini-api-key
                  optional: true
            # GitOps Credentials
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: jevin-github-auth
                  key: github-pat
            - name: GITHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jevin-github-auth
                  key: github-username
          volumeMounts:
            - name: user-workspace
              mountPath: /workspace
      volumes:
        - name: user-workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jevin
  namespace: ai-platform
  labels:
    app: jevin
spec:
  type: ClusterIP
  selector:
    app: jevin
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
