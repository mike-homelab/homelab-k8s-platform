apiVersion: batch/v1
kind: CronJob
metadata:
  name: aws-docs-ingestor
  namespace: ai-platform
spec:
  schedule: "30 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ingestor
              image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/docs-ingestor:0.2.1
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: docs-ingestors-config
              env:
                - name: SOURCE_NAME
                  value: aws
                - name: TENANT
                  value: aws-docs
                - name: START_URL
                  value: https://docs.aws.amazon.com/
                - name: SITEMAP_URL
                  value: https://docs.aws.amazon.com/sitemap_index.xml
                - name: ALLOWED_HOSTS
                  value: docs.aws.amazon.com
                - name: URL_PREFIXES
                  value: https://docs.aws.amazon.com/
                - name: QDRANT_COLLECTION
                  value: docs-aws
                - name: PRIORITY_KEYWORDS
                  value: guide
                - name: EMBED_WORKERS
                  value: "6"
                - name: EMBED_BATCH_SIZE
                  value: "12"
                - name: RESET_COLLECTION_ON_START
                  value: "true"
                - name: MAX_PAGES
                  value: "10000"
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
