apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-platform
data:
  config.yaml: |
    model_list:
      - model_name: "builder"
        litellm_params:
          model: "ollama/qwen2.5-coder:14b"
          api_base: "http://builder.ai-platform.svc:11434"
          num_ctx: 81920
      - model_name: "analyst"
        litellm_params:
          model: "ollama/phi4"
          api_base: "http://analyst.ai-platform.svc:11434"
          num_ctx: 81920

    litellm_settings:
      drop_params: true
      set_verbose: true
      callbacks: ["prometheus"]