apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-platform
data:
  config.yaml: |
    model_list:
      - model_name: "agent-executor"
        litellm_params:
          model: "ollama/mistral-small:24b"
          api_base: "http://vllm-coder.ai-platform.svc:11434"
          num_ctx: 16384
      - model_name: "agent-planner"
        litellm_params:
          model: "ollama/deepseek-r1:14b"
          api_base: "http://vllm-reasoning.ai-platform.svc:11434"
          num_ctx: 32768
      - model_name: "coder" # Legacy alias
        litellm_params:
          model: "ollama/mistral-small:24b"
          api_base: "http://vllm-coder.ai-platform.svc:11434"
          num_ctx: 16384
      - model_name: "reasoning" # Legacy alias
        litellm_params:
          model: "ollama/deepseek-r1:14b"
          api_base: "http://vllm-reasoning.ai-platform.svc:11434"
          num_ctx: 32768
    litellm_settings:
      drop_params: true
      set_verbose: true