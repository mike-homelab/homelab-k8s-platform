apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-platform
data:
  config.yaml: |
    model_list:
      - model_name: "builder"
        litellm_params:
          model: "ollama/builder"
          api_base: "http://builder.ai-platform.svc:11434"
          num_ctx: 32768
      - model_name: "analyst"
        litellm_params:
          model: "ollama/analyst"
          api_base: "http://analyst.ai-platform.svc:11434"
          num_ctx: 32768

    litellm_settings:
      drop_params: true
      set_verbose: true
      callbacks: ["prometheus"]