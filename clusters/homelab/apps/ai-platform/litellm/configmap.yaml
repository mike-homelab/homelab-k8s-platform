apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-platform
data:
  config.yaml: |
    model_list:
      - model_name: "builder"
        litellm_params:
          model: "ollama/hf.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:Q4_K_M"
          api_base: "http://builder.ai-platform.svc:11434"
      - model_name: "analyst"
        litellm_params:
          model: "ollama/hf.co/unsloth/Mistral-Small-3.2-24B-Instruct-2506-GGUF:UD-Q4_K_XL"
          api_base: "http://analyst.ai-platform.svc:11434"
      
      # Legacy aliases for backward compatibility
      - model_name: "agent-planner"
        litellm_params:
          model: "ollama/hf.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:Q4_K_M"
          api_base: "http://builder.ai-platform.svc:11434"
      - model_name: "reasoning"
        litellm_params:
          model: "ollama/hf.co/unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:Q4_K_M"
          api_base: "http://builder.ai-platform.svc:11434"
      - model_name: "agent-executor"
        litellm_params:
          model: "ollama/hf.co/unsloth/Mistral-Small-3.2-24B-Instruct-2506-GGUF:UD-Q4_K_XL"
          api_base: "http://analyst.ai-platform.svc:11434"
      - model_name: "coder"
        litellm_params:
          model: "ollama/hf.co/unsloth/Mistral-Small-3.2-24B-Instruct-2506-GGUF:UD-Q4_K_XL"
          api_base: "http://analyst.ai-platform.svc:11434"

    litellm_settings:
      drop_params: true
      set_verbose: true