apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm-route
  namespace: ai-platform
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
  hostnames:
    - llm.michaelhomelab.work
  rules:
    - timeouts:
        request: 300s
        backendRequest: 300s
      matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: litellm
          port: 4000
