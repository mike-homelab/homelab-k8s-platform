apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: knowledge-chat-app
  namespace: ai-platform
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
  hostnames:
    - knowledge-chat.michaelhomelab.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: knowledge-chat-app
          port: 80
