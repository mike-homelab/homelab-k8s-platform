apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-chat-app
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-chat-app
  template:
    metadata:
      labels:
        app: knowledge-chat-app
    spec:
      containers:
        - name: web
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://agent-api:8000/v1"
            - name: OPENAI_API_KEY
              value: "sk-vllm-coder-homelab"
            - name: WEBUI_AUTH
              value: "False"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
