apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-chat-app
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-chat-app
  template:
    metadata:
      labels:
        app: knowledge-chat-app
    spec:
      containers:
        - name: web
          image: docker.michaelhomelab.work/homelab-docker-repo/ai-platform/knowledge-chat-app:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VLLM_API_URL
              value: "http://vllm-coder:8000/v1/chat/completions"
            - name: EMBEDDING_API_URL
              value: "http://embedding-api:80/query"
            - name: RERANKER_API_URL
              value: "http://reranker:80/rerank"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
