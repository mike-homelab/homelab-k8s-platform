apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-api-config
  namespace: ai-platform
data:
  APP_ENV: production
  APP_PORT: "8000"
  VLLM_BASE_URL: http://vllm-llm.ai-platform.svc.cluster.local:8000/v1
  VLLM_GENERAL_BASE_URL: http://vllm-llm.ai-platform.svc.cluster.local:8000/v1
  VLLM_CODER_BASE_URL: http://vllm-coder.ai-platform.svc.cluster.local:8000/v1
  EMBEDDING_BASE_URL: http://embedding-api.ai-platform.svc.cluster.local:80
  QDRANT_URL: http://qdrant.ai-platform.svc.cluster.local:6333
  CORS_ALLOW_ORIGINS: https://knowledge-chat.michaelhomelab.work,http://localhost:3000,http://localhost:8080
  REDIS_URL: redis://redis.ai-platform.svc.cluster.local:6379/0
  POSTGRES_HOST: postgres.ai-platform.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ai_platform
  POSTGRES_USER: ai
  OTEL_SERVICE_NAME: agent-api
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
