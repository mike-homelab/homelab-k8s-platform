apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-api-argocd-read
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-api-argocd-read
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: agent-api-ops
    namespace: ai-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-api-argocd-read
