apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-api-ops
  namespace: ai-platform
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-api-ops
  namespace: ai-platform
subjects:
  - kind: ServiceAccount
    name: agent-api-ops
    namespace: ai-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-api-ops
