apiVersion: v1
kind: Service
metadata:
  name: agent-api
  namespace: ai-platform
  labels:
    app: agent-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: agent-api
  ports:
    - name: http
      port: 8000
      targetPort: http
