apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: 'AI Inference'
        orgId: 1
        folder: 'AI Inference'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/ai-inference
