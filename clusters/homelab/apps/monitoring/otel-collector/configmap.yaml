apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Self-metrics only (optional, safe)
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              static_configs:
                - targets: ["0.0.0.0:8888"]

    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          node_from_env_var: K8S_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time

    exporters:
      otlp_http/loki:
        endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp
        tls:
          insecure: true

      otlp_http/tempo:
        endpoint: http://tempo-distributor.monitoring.svc.cluster.local:4318
        tls:
          insecure: true

      prometheusremotewrite:
        endpoint: "http://mimir-distributor.monitoring.svc.cluster.local:8080/api/v1/push"
        tls:
          insecure: true

    service:
      telemetry:
        logs:
          level: info
        metrics:
          level: detailed
        traces:
          level: detailed

      pipelines:
        logs:
          receivers: [otlp]
          processors: [k8s_attributes, batch]
          exporters: [otlp_http/loki]

        traces:
          receivers: [otlp]
          processors: [k8s_attributes, batch]
          exporters: [otlp_http/tempo]

        metrics:
          receivers: [otlp]
          processors: [k8s_attributes, batch]
          exporters: [prometheusremotewrite]
