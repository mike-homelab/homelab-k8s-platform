apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ai-inference
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    grafana_folder: "AI_Inference"
    grafana_dashboard_version: "1"

data:
  ai-inference.json: |
    {
      "uid": "ai-inference",
      "title": "AI Inference Tiered Observability",
      "tags": ["ai","inference","tiered"],
      "time": {"from": "now-6h", "to": "now"},
      "templating": {
        "list": []
      },
      "panels": [
        {
          "type": "row",
          "title": "The Builder (RTX 5070-Ti)",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Builder: Input Tokens / Sec",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "targets": [{"expr": "sum(rate(litellm_prompt_tokens_total{requested_model=\"builder\"}[1m])) or sum(rate(ollama_prompt_tokens_total{model=~\".*builder.*\"}[1m]))", "legendFormat": "Input"}]
        },
        {
          "type": "timeseries",
          "title": "Builder: Output Tokens / Sec",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "targets": [{"expr": "sum(rate(litellm_completion_tokens_total{requested_model=\"builder\"}[1m])) or sum(rate(ollama_eval_tokens_total{model=~\".*builder.*\"}[1m]))", "legendFormat": "Output"}]
        },
        {
          "type": "timeseries",
          "title": "Builder: VRAM Usage (MiB)",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 9},
          "targets": [{"expr": "DCGM_FI_DEV_FB_USED{namespace=\"ai-platform\", pod=~\"builder-.*\"}", "legendFormat": "VRAM Used"}]
        },
        {
          "type": "timeseries",
          "title": "Builder: GPU Utilization (%)",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 9},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL{namespace=\"ai-platform\", pod=~\"builder-.*\"}", "legendFormat": "GPU Util"}]
        },
        {
          "type": "timeseries",
          "title": "Builder: CPU Usage (Cores)",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 9},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"builder-.*\", container=\"ollama\"}[1m]))", "legendFormat": "CPU"}]
        },
        {
          "type": "timeseries",
          "title": "Builder: RAM Usage (GiB)",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 17},
          "targets": [{"expr": "sum(container_memory_usage_bytes{pod=~\"builder-.*\", container=\"ollama\"}) / 1024 / 1024 / 1024", "legendFormat": "RAM"}]
        },
        {
          "type": "row",
          "title": "The Analyst (RTX 5060-Ti)",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17}
        },
        {
          "type": "timeseries",
          "title": "Analyst: Input Tokens / Sec",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18},
          "targets": [{"expr": "sum(rate(litellm_prompt_tokens_total{requested_model=\"analyst\"}[1m])) or sum(rate(ollama_prompt_tokens_total{model=~\".*analyst.*\"}[1m]))", "legendFormat": "Input"}]
        },
        {
          "type": "timeseries",
          "title": "Analyst: Output Tokens / Sec",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18},
          "targets": [{"expr": "sum(rate(litellm_completion_tokens_total{requested_model=\"analyst\"}[1m])) or sum(rate(ollama_eval_tokens_total{model=~\".*analyst.*\"}[1m]))", "legendFormat": "Output"}]
        },
        {
          "type": "timeseries",
          "title": "Analyst: VRAM Usage (MiB)",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 26},
          "targets": [{"expr": "DCGM_FI_DEV_FB_USED{namespace=\"ai-platform\", pod=~\"analyst-.*\"}", "legendFormat": "VRAM Used"}]
        },
        {
          "type": "timeseries",
          "title": "Analyst: GPU Utilization (%)",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 26},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL{namespace=\"ai-platform\", pod=~\"analyst-.*\"}", "legendFormat": "GPU Util"}]
        },
        {
          "type": "timeseries",
          "title": "Analyst: CPU Usage (Cores)",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 26},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"analyst-.*\", container=\"ollama\"}[1m]))", "legendFormat": "CPU"}]
        },
        {
          "type": "timeseries",
          "title": "Analyst: RAM Usage (GiB)",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 34},
          "targets": [{"expr": "sum(container_memory_usage_bytes{pod=~\"analyst-.*\", container=\"ollama\"}) / 1024 / 1024 / 1024", "legendFormat": "RAM"}]
        }
      ]
    }
