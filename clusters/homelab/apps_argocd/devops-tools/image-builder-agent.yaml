apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-builder-agent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  project: devops-tools
  source:
    repoURL: https://github.com/mike-homelab/homelab-k8s-platform
    targetRevision: main
    path: clusters/homelab/apps/devops-tools/image-builder-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-tools
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
