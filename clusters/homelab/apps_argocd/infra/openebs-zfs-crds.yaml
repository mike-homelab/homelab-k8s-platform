apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs-zfs-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://openebs.github.io/openebs
    chart: zfs-localpv
    targetRevision: "4.2.0"
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - Replace=true
    - Prune=false   # 🚨 CRDs must never be pruned
