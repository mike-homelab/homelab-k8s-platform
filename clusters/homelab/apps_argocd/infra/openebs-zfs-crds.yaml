apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs-zfs-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/openebs/zfs-localpv
    targetRevision: v2.6.0
    path: clusters/homelab/infra/zfs-crds
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - Replace=true
    - Prune=false   # 🚨 CRDs must never be pruned
