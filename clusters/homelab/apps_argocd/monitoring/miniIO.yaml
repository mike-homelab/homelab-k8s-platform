apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"

spec:
  project: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: "5.4.0"

    helm:
      values: |
        mode: standalone

        deployment:
          strategy:
            type: Recreate

        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        persistence:
          enabled: true
          storageClass: mayastor-single-replica
          size: 200Gi

        # Optional: still pin if you want predictable locality
        nodeSelector:
          kubernetes.io/hostname: kubeworker01

  syncPolicy:
    syncOptions:
      - CreateNamespace=true