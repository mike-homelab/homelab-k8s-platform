apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch
  namespace: argocd
spec:
  project: monitoring

  source:
    repoURL: https://opensearch-project.github.io/helm-charts
    chart: opensearch
    targetRevision: "2.30.0"
    helm:
      values: |
        clusterName: homelab-opensearch
        singleNode: false

        nodeGroup: all
        replicas: 1

        roles:
          - cluster_manager
          - data
          - ingest

        persistence:
          enabled: true
          size: 100Gi
          storageClass: zfs-nvme

        opensearchJavaOpts: "-Xms512m -Xmx512m"

        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "400m"
            memory: "2Gi"

        antiAffinity: ""

        extraEnvs:
          - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: opensearch-admin
                key: password

        config:
            discovery.seed_hosts: "homelab-opensearch-all-0"
          cluster.initial_cluster_manager_nodes: "homelab-opensearch-all-0"

        securityConfig:
          enabled: true
          tls:
            http:
              enabled: true
              secret: opensearch-tls
            transport:
              enabled: true
              secret: opensearch-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
