apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: monitoring
  source:
    repoURL: https://opensearch-project.github.io/helm-charts
    chart: opensearch
    targetRevision: 2.30.0
    helm:
      values: |
        clusterName: homelab-opensearch
        nodeGroup: data

        replicas: 0

        persistence:
          enabled: true
          size: 100Gi
          storageClass: zfs-nvme

        # Ensure one pod per Kubernetes node
        antiAffinity: hard

        # Shard placement awareness
        config:
          cluster.routing.allocation.awareness.attributes: k8s_node
          node.attr.k8s_node: ${NODE_NAME}

        extraEnvs:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # JVM heap must be explicitly limited
        opensearchJavaOpts: "-Xms2g -Xmx2g"

        resources:
          requests:
            cpu: "500m"
            memory: "3Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

        securityConfig:
          enabled: true
          tls:
            http:
              enabled: true
              secret: opensearch-tls
            transport:
              enabled: true
              secret: opensearch-tls

        service:
          type: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
