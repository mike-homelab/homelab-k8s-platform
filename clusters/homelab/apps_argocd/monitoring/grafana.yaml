apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: "10.5.15"
    helm:
      values: |
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1G
        persistence:
          enabled: true
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          size: 10Gi
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:

              # Metrics → Mimir
              - name: Mimir
                type: prometheus
                access: proxy
                url: http://mimir-query-frontend.monitoring.svc:8080/prometheus
                isDefault: true
                jsonData:
                  httpHeaderName1: X-Scope-OrgID
                  manageAlerts: false
                secureJsonData:
                  httpHeaderValue1: anonymous

              # Logs → Loki (FIXED)
              - name: Loki
                type: loki
                access: proxy
                url: http://loki-gateway.monitoring.svc
                jsonData:
                  httpHeaderName1: X-Scope-OrgID
                secureJsonData:
                  httpHeaderValue1: anonymous

              # Traces → Tempo
              - name: Tempo
                type: tempo
                access: proxy
                url: http://tempo-query-frontend.monitoring.svc:3200
        extraVolumes:
          - name: dashboard-providers
            configMap:
              name: grafana-dashboard-providers
          - name: ai-inference-dashboard
            configMap:
              name: grafana-dashboard-ai-inference
        extraVolumeMounts:
          - name: dashboard-providers
            mountPath: /etc/grafana/provisioning/dashboards
          - name: ai-inference-dashboard
            mountPath: /var/lib/grafana/dashboards/ai-inference
        adminPassword: admin@Homelab

