---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mayastor-nvme-kube1
provisioner: io.openebs.csi-mayastor
parameters:
  repl: "1"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
- matchLabelExpressions:
  - key: topology.openebs.io/node
    operator: In
    values:
      - kubeworker01
