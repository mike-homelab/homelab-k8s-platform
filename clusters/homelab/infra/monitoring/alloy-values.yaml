alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  configContent: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      // Node filtering: Each Alloy instance only scrapes pods on its local node
      // rule {
      //   source_labels = ["__meta_kubernetes_pod_node_name"]
      //   regex         = env("HOSTNAME")
      //   action        = "keep"
      // }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }

      // Dynamic job labeling
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "job"
      }

      // Specific handling for dcgm-exporter to match Dashboard 9822 expectations
      rule {
        source_labels = ["job"]
        regex         = "nvidia-dcgm-exporter"
        replacement   = "gpu-metrics"
        target_label  = "job"
      }

      // Default job name if no app label found
      rule {
        source_labels = ["job"]
        regex         = ""
        replacement   = "kubernetes-pods"
        target_label  = "job"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "service"
      }
    }

    // --- LOGS ---
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki-write.monitoring.svc:3100/loki/api/v1/push"
      }
    }

    discovery.kubernetes "dcgm" {
      role = "endpoints"
      namespaces {
        names = ["gpu-operator"]
      }
    }

    discovery.relabel "dcgm" {
      targets = discovery.kubernetes.dcgm.targets
      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = "nvidia-dcgm-exporter"
        action        = "keep"
      }
      rule {
        replacement  = "gpu-metrics"
        target_label = "job"
      }
      rule {
        source_labels = ["__meta_kubernetes_endpoint_node_name"]
        target_label  = "node"
      }
    }

    prometheus.scrape "dcgm" {
      targets    = discovery.relabel.dcgm.output
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.scrape "default" {
      targets    = discovery.relabel.pods.output
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "http://mimir-gateway.monitoring.svc/api/v1/push"
      }
    }

    // --- TRACES ---
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        metrics = [prometheus.remote_write.default.receiver]
        logs    = [loki.write.default.receiver]
        traces  = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo-distributor.monitoring.svc:4317"
        tls {
          insecure = true
        }
      }
    }

controller:
  type: daemonset

serviceAccount:
  create: true
  name: alloy

storage:
  enabled: true
