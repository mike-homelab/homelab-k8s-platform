---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
spec:
  vault:
    server: https://vault.michaelhomelab.work:8200
    path: pki_int/sign/k8s-issuer
    caBundleSecretRef:
      name: vault-tls-ca
      key: ca.crt
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: k8s-issuer
        serviceAccountRef:
          name: cert-manager