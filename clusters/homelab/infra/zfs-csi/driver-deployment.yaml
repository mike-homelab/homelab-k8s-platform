apiVersion: apps/v1
kind: Deployment
metadata:
  name: zfs-csi-controller
  namespace: zfs-csi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zfs-csi-controller
  template:
    metadata:
      labels:
        app: zfs-csi-controller
    spec:
      serviceAccountName: zfs-csi-sa
      containers:
      - name: zfs-plugin
        image: openebs/zfs-driver:2.9.0
        args:
          - "--plugin=controller"
          - "--name=zfs-localpv"
          - "--endpoint=unix:///var/lib/kubelet/plugins/zfs-localpv/csi.sock"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/zfs-localpv

      - name: csi-provisioner
        image: registry.k8s.io/sig-storage/csi-provisioner:v3.5.0
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs-localpv/csi.sock"
          - "--leader-election=true"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/zfs-localpv

      - name: csi-resizer
        image: registry.k8s.io/sig-storage/csi-resizer:v1.8.0
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs-localpv/csi.sock"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/zfs-localpv

      - name: liveness-probe
        image: registry.k8s.io/sig-storage/livenessprobe:v2.9.0
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs-localpv/csi.sock"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/zfs-localpv

      volumes:
      - name: socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/zfs-localpv
          type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zfs-csi-node
  namespace: zfs-csi
spec:
  selector:
    matchLabels:
      app: zfs-csi-node
  template:
    metadata:
      labels:
        app: zfs-csi-node
    spec:
      serviceAccountName: zfs-csi-sa
      containers:
      - name: zfs-plugin
        image: openebs/zfs-driver:2.9.0
        securityContext:
          privileged: true
        args:
          - "--plugin=node"
          - "--name=zfs-localpv"
          - "--endpoint=unix:///plugin/csi.sock"
          - "--nodename=$(KUBE_NODE_NAME)"
        env:
        - name: KUBE_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: plugin-dir
          mountPath: /plugin
        - name: device-dir
          mountPath: /dev
        - name: run-dir
          mountPath: /run
        - name: udev-dir
          mountPath: /etc/udev

      - name: csi-node-driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.6.0
        args:
          - "--csi-address=/plugin/csi.sock"
          - "--registration-path=/registration/zfs-localpv-reg.sock"
          - "--kubelet-registration-path=/var/lib/kubelet/plugins/zfs-localpv/csi.sock"
        volumeMounts:
        - name: plugin-dir
          mountPath: /plugin
        - name: registration-dir
          mountPath: /registration

      - name: liveness-probe
        image: registry.k8s.io/sig-storage/livenessprobe:v2.9.0
        args:
          - "--csi-address=/plugin/csi.sock"
        volumeMounts:
        - name: plugin-dir
          mountPath: /plugin

      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/zfs-localpv
          type: DirectoryOrCreate
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry/zfs-localpv
          type: DirectoryOrCreate
      - name: device-dir
        hostPath:
          path: /dev
      - name: run-dir
        hostPath:
          path: /run
      - name: udev-dir
        hostPath:
          path: /etc/udev
