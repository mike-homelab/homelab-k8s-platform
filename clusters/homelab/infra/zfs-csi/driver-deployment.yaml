apiVersion: apps/v1
kind: Deployment
metadata:
  name: zfs-csi-controller
  namespace: zfs-csi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zfs-csi-controller
  template:
    metadata:
      labels:
        app: zfs-csi-controller
    spec:
      serviceAccountName: zfs-csi-sa
      containers:

      - name: zfs-plugin
        image: openebs/zfs-driver:2.6.0
        args:
          - "--plugin=controller"
          - "--name=zfs.csi.openebs.io"
          - "--endpoint=unix:///var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: socket-dir
            mountPath: /var/lib/kubelet/plugins/zfs.csi.openebs.io

      - name: csi-provisioner
        image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
          - "--leader-election=true"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
          - name: socket-dir
            mountPath: /var/lib/kubelet/plugins/zfs.csi.openebs.io

      - name: csi-resizer
        image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
          - name: socket-dir
            mountPath: /var/lib/kubelet/plugins/zfs.csi.openebs.io

      - name: liveness-probe
        image: registry.k8s.io/sig-storage/livenessprobe:v2.13.1
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
          - name: socket-dir
            mountPath: /var/lib/kubelet/plugins/zfs.csi.openebs.io

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/zfs.csi.openebs.io
            type: DirectoryOrCreate

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zfs-csi-node
  namespace: zfs-csi
spec:
  selector:
    matchLabels:
      app: zfs-csi-node
  template:
    metadata:
      labels:
        app: zfs-csi-node
    spec:
      serviceAccountName: zfs-csi-sa
      containers:
      - name: zfs-plugin
        image: openebs/zfs-driver:2.6.0
        securityContext:
          privileged: true
        args:
          - "--plugin=node"
          - "--name=zfs.csi.openebs.io"
          - "--endpoint=unix:///var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
          - "--nodename=$(KUBE_NODE_NAME)"
        env:
        - name: KUBE_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: Bidirectional
        - name: device-dir
          mountPath: /dev
        - name: run-dir
          mountPath: /run
        - name: udev-dir
          mountPath: /etc/udev
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      - name: csi-node-driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
          - "--kubelet-registration-path=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
        volumeMounts:
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
        - name: registration-dir
          mountPath: /registration

      - name: liveness-probe
        image: registry.k8s.io/sig-storage/livenessprobe:v2.13.1
        args:
          - "--csi-address=/var/lib/kubelet/plugins/zfs.csi.openebs.io/csi.sock"
        volumeMounts:
        - name: kubelet-dir
          mountPath: /var/lib/kubelet

      volumes:
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: device-dir
        hostPath:
          path: /dev
      - name: run-dir
        hostPath:
          path: /run
      - name: udev-dir
        hostPath:
          path: /etc/udev

