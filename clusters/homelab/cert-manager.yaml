apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    # Ensure cert-manager installs before issuers
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.19.2  # pin version (recommended)
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true

        global:
          leaderElection:
            namespace: cert-manager

        prometheus:
          enabled: false

        controller:
          extraVolumes:
            - name: vault-ca
              configMap:
                name: vault-ca

          extraVolumeMounts:
            - name: vault-ca
              mountPath: /etc/ssl/certs/vault-ca.crt
              subPath: vault-ca.crt

          extraEnv:
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/vault-ca.crt

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
